<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Medtech Solutions</title>
    <script>
      // GitHub Pages SPA redirect — strips the base path then stores the route
      var base = '/medtech-solutions';
      var path = window.location.pathname.slice(base.length) || '/';
      var search = window.location.search;
      var hash = window.location.hash;
      sessionStorage.setItem('spa_redirect', path + search + hash);
      window.location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
